<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líneas de Tensión | JHP Datum</title>
    <script>if (!sessionStorage.getItem('sesion_jhp_activa')) window.location.href = 'index.html';</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8 block">
        <div class="max-w-6xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 bg-slate-900 p-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <div class="flex items-center gap-5 relative z-10">
                    <div class="w-16 h-16 bg-yellow-500 rounded-[1.5rem] flex items-center justify-center shadow-2xl rotate-3"><i class="fas fa-bolt text-slate-900 text-2xl"></i></div>
                    <div>
                        <h2 class="text-white font-black text-2xl italic uppercase tracking-wider">LÍNEAS DE TENSIÓN</h2>
                        <p class="text-yellow-500 text-[10px] font-bold tracking-[0.3em]">Módulo Eléctrico | <span id="nombreUsuarioActivo" class="text-white uppercase"></span></p>
                    </div>
                </div>
                <div class="flex gap-4 z-10"><button onclick="cerrarSesion()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-8 py-3 rounded-2xl text-[10px] font-black tracking-[0.2em] transition-all border border-red-500/20"><i class="fas fa-power-off mr-2"></i> SALIR</button></div>
            </header>

            <div class="flex flex-wrap gap-3 mb-6">
                <a href="edificaciones.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-building mr-2"></i> Edificaciones</a>
                <a href="saneamiento.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-water mr-2"></i> Saneamiento</a>
                <a href="carreteras.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-road mr-2"></i> Carreteras</a>
                <a href="lineas.html" class="bg-slate-900 text-white px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-lg transition-all"><i class="fas fa-bolt mr-2"></i> Líneas de Tensión</a>
            </div>

            <div class="glass-card rounded-[3rem] p-16 shadow-xl text-center flex flex-col items-center justify-center border-dashed border-2 border-slate-300">
                <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-6"><i class="fas fa-bolt text-4xl text-slate-400"></i></div>
                <h3 class="text-3xl font-black text-slate-800 uppercase italic mb-2">Módulo en Desarrollo</h3>
                <p class="text-slate-500 max-w-md">El software para catenarias y flechas de tendido eléctrico se encuentra en fase de pruebas.</p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('nombreUsuarioActivo').innerText = sessionStorage.getItem('sesion_jhp_activa');
        function cerrarSesion() { sessionStorage.removeItem('sesion_jhp_activa'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
