<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saneamiento | JHP Datum</title>
    <script>if (!sessionStorage.getItem('sesion_jhp_activa')) window.location.href = 'index.html';</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05); }
        .res-table { width: 100%; border-collapse: separate; border-radius: 1.5rem; overflow: hidden; } .res-table th { background-color: #0f172a; color: #f8fafc; padding: 1rem; text-transform: uppercase; font-size: 0.7rem; } .res-table td { padding: 1rem; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,0.7); font-size: 0.9rem; } .lectura-roja { color: #e11d48; font-weight: 700; font-family: monospace; font-size: 1.1rem; } .total-row td { background-color: #fef9c3 !important; font-weight: 800; border-top: 2px solid #eab308; }
        @media print { body.printing-mode > :not(#print-container) { display: none !important; } #print-container { display: block !important; width: 100%; padding: 20px; } }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8 block">
        <div class="max-w-6xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 bg-slate-900 p-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <div class="flex items-center gap-5 relative z-10">
                    <div class="w-16 h-16 bg-yellow-500 rounded-[1.5rem] flex items-center justify-center shadow-2xl rotate-3"><i class="fas fa-water text-slate-900 text-2xl"></i></div>
                    <div><h2 class="text-white font-black text-2xl italic uppercase tracking-wider">SANEAMIENTO</h2><p class="text-yellow-500 text-[10px] font-bold tracking-[0.3em]">Módulo Hidráulico | <span id="nombreUsuarioActivo" class="text-white uppercase"></span></p></div>
                </div>
                <div class="flex gap-4 z-10"><button onclick="cerrarSesion()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-8 py-3 rounded-2xl text-[10px] font-black tracking-[0.2em] transition-all border border-red-500/20"><i class="fas fa-power-off mr-2"></i> SALIR</button></div>
            </header>

            <div class="flex flex-wrap gap-3 mb-6">
                <a href="edificaciones.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-building mr-2"></i> Edificaciones</a>
                <a href="saneamiento.html" class="bg-slate-900 text-white px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-lg transition-all"><i class="fas fa-water mr-2"></i> Saneamiento</a>
                <a href="carreteras.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-road mr-2"></i> Carreteras</a>
                <a href="lineas.html" class="bg-white text-slate-600 px-7 py-3 rounded-full font-black text-xs uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all border border-slate-200"><i class="fas fa-bolt mr-2"></i> Líneas de Tensión</a>
            </div>

            <div class="glass-card rounded-[3rem] p-8 md:p-12 shadow-2xl">
                <div class="grid lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-1 space-y-6">
                        <h3 class="text-2xl font-black text-slate-800 italic border-l-4 border-indigo-500 pl-5 uppercase mb-4">Control Hidráulico</h3>
                        <div class="space-y-5">
                            <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Cota Instrumento (m)</label><input type="number" id="t_cotaInst" step="0.001" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Cota Inicio</label><input type="number" id="t_cotaIni" step="0.001" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                                <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Cota Fin</label><input type="number" id="t_cotaFin" step="0.001" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                            </div>
                            <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Distancia Total (m)</label><input type="number" id="t_distTotal" step="0.01" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Offset</label><input type="number" id="t_offset" value="0.50" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                                <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Interv.</label><input type="number" id="t_inter" value="3.00" class="w-full p-5 bg-slate-50 rounded-2xl border font-bold"></div>
                            </div>
                            <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Diámetro Tubería (m)</label><input type="number" id="t_diametro" step="0.001" value="0.200" class="w-full p-5 bg-indigo-50 rounded-2xl border border-indigo-200 font-bold text-indigo-900"></div>
                        </div>
                        <button onclick="calcularTuberias()" class="w-full bg-indigo-600 text-white py-6 rounded-2xl font-black uppercase tracking-widest active:scale-95"><i class="fas fa-water"></i> CALCULAR TUBERÍA</button>
                    </div>
                    <div class="lg:col-span-2">
                        <div id="imprimir-tuberias" class="hidden bg-white p-6 rounded-[2rem]">
                            <div id="resumen-t" class="mb-8 p-8 bg-indigo-50 rounded-[2.5rem] border border-indigo-100 flex justify-around items-center">
                                <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Desnivel Solera</p><p class="text-4xl font-black text-slate-800"><span id="info-desnivel-t"></span>m</p></div>
                                <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Pendiente</p><p class="text-4xl font-black text-indigo-600"><span id="info-pendiente-t"></span>%</p></div>
                            </div>
                            <div class="overflow-x-auto rounded-[2rem] border border-slate-100 mb-8" id="res-tuberias"></div>
                        </div>
                        <button id="btn-pdf-tub" onclick="descargarPDF('imprimir-tuberias')" class="hidden mt-6 w-full bg-red-600 text-white py-5 rounded-2xl font-black uppercase active:scale-95"><i class="fas fa-file-pdf text-xl"></i> DESCARGAR PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('nombreUsuarioActivo').innerText = sessionStorage.getItem('sesion_jhp_activa');
        function cerrarSesion() { sessionStorage.removeItem('sesion_jhp_activa'); window.location.href = 'index.html'; }
        function descargarPDF(idContenedor) { const elementoOriginal = document.getElementById(idContenedor); let printContainer = document.getElementById('print-container') || document.createElement('div'); printContainer.id = 'print-container'; document.body.appendChild(printContainer); printContainer.innerHTML = elementoOriginal.innerHTML; document.body.classList.add('printing-mode'); window.print(); document.body.classList.remove('printing-mode'); printContainer.innerHTML = ''; }
        function calcularTuberias() { const ci=parseFloat(document.getElementById('t_cotaInst').value), c0=parseFloat(document.getElementById('t_cotaIni').value), c1=parseFloat(document.getElementById('t_cotaFin').value), dT=parseFloat(document.getElementById('t_distTotal').value), offset=parseFloat(document.getElementById('t_offset').value), inter=parseFloat(document.getElementById('t_inter').value), diam=parseFloat(document.getElementById('t_diametro').value); if(isNaN(ci)||isNaN(c0)||isNaN(c1)||isNaN(diam)) return; const des=c1-c0, pendRel=des/dT; document.getElementById('info-desnivel-t').innerText=des.toFixed(3); document.getElementById('info-pendiente-t').innerText=(pendRel*100).toFixed(2); let html=`<table class="res-table"><thead><tr><th>Dist</th><th>Cota Solera</th><th>Mira (Clave)</th></tr></thead><tbody>`; for(let d=offset; d<dT; d+=inter) { let cp=c0+(d*pendRel); html+=`<tr><td>${d.toFixed(2)}</td><td>${cp.toFixed(3)}</td><td class="lectura-roja">${((ci-cp)-diam).toFixed(3)}</td></tr>`; } html+=`</tbody></table>`; document.getElementById('res-tuberias').innerHTML=html; document.getElementById('imprimir-tuberias').classList.remove('hidden'); document.getElementById('btn-pdf-tub').classList.remove('hidden'); }
    </script>
</body>
</html>
